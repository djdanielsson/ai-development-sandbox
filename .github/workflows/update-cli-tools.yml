---
name: "Update CLI Tool Versions"

on:
  schedule:
    - cron: "40 6 * * 1" # Monday 06:40 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-cli-tools:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check for CLI tool updates
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tools_file=".devcontainer/scripts/install-tools.sh"
          changes=""
          updated="false"

          check_update() {
            local name="$1" var="$2" latest="$3"
            local current
            current=$(grep -oP "${var}=\"\\K[^\"]+" "$tools_file")

            if [ "$current" != "$latest" ]; then
              echo "${name}: ${current} → ${latest}"
              sed -i "s|${var}=\"${current}\"|${var}=\"${latest}\"|" "$tools_file"
              changes="${changes}- **${name}**: \`${current}\` → \`${latest}\`"$'\n'
              updated="true"
            else
              echo "${name}: up to date (${current})"
            fi
          }

          # kubectl — latest stable from upstream
          kubectl_latest=$(curl -sSL https://dl.k8s.io/release/stable.txt)
          check_update "kubectl" "KUBECTL_VERSION" "$kubectl_latest"

          # helm
          helm_latest=$(gh api repos/helm/helm/releases/latest --jq '.tag_name')
          check_update "helm" "HELM_VERSION" "$helm_latest"

          # terraform
          terraform_latest=$(gh api repos/hashicorp/terraform/releases/latest --jq '.tag_name')
          check_update "terraform" "TERRAFORM_VERSION" "$terraform_latest"

          # argocd
          argocd_latest=$(gh api repos/argoproj/argo-cd/releases/latest --jq '.tag_name')
          check_update "argocd" "ARGOCD_VERSION" "$argocd_latest"

          # kustomize (tag format: kustomize/vX.Y.Z)
          kustomize_latest=$(gh api repos/kubernetes-sigs/kustomize/releases \
            --jq '[.[] | select(.tag_name | startswith("kustomize/")) | .tag_name][0]' \
            | sed 's|kustomize/||')
          check_update "kustomize" "KUSTOMIZE_VERSION" "$kustomize_latest"

          # virtctl
          virtctl_latest=$(gh api repos/kubevirt/kubevirt/releases/latest --jq '.tag_name')
          check_update "virtctl" "VIRTCTL_VERSION" "$virtctl_latest"

          # tkn (Tekton CLI)
          tkn_latest=$(gh api repos/tektoncd/cli/releases/latest --jq '.tag_name')
          check_update "tkn" "TKN_VERSION" "$tkn_latest"

          echo "changed=$updated" >> "$GITHUB_OUTPUT"
          {
            echo "diff_summary<<EOF"
            echo "$changes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/update-cli-tools
          delete-branch: true
          title: "tools: update CLI tool versions"
          body: |
            Automated update of pinned CLI tool versions in `install-tools.sh`.

            ### Changes
            ${{ steps.check.outputs.diff_summary }}

            ---
            *Generated by the [update-cli-tools](${{ github.server_url }}/${{ github.repository }}/actions/workflows/update-cli-tools.yml) workflow.*
          labels: dependencies,cli-tools
          commit-message: "tools: update CLI tool versions"
