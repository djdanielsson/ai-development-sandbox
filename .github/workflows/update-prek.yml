---
name: "Update prek Version"

on:
  schedule:
    - cron: "20 6 * * 1" # Monday 06:20 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-prek:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for new prek release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest_tag=$(gh api repos/j178/prek/releases/latest --jq '.tag_name')
          current_tag=$(grep -oP 'PREK_VERSION="\K[^"]+' .devcontainer/scripts/install-tools.sh)

          echo "latest=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "current=$current_tag" >> "$GITHUB_OUTPUT"

          if [ "$latest_tag" = "$current_tag" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "prek is already up to date ($current_tag)."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "prek update: $current_tag → $latest_tag"
            sed -i "s|PREK_VERSION=\"${current_tag}\"|PREK_VERSION=\"${latest_tag}\"|" .devcontainer/scripts/install-tools.sh
          fi

      - name: Create pull request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/update-prek
          delete-branch: true
          title: "prek: update to ${{ steps.check.outputs.latest }}"
          body: |
            Automated update of the prek version pin.

            ### Changes
            - **prek**: `${{ steps.check.outputs.current }}` → `${{ steps.check.outputs.latest }}`
            - [Release notes](https://github.com/j178/prek/releases/tag/${{ steps.check.outputs.latest }})

            ---
            *Generated by the [update-prek](${{ github.server_url }}/${{ github.repository }}/actions/workflows/update-prek.yml) workflow.*
          labels: dependencies,prek
          commit-message: "prek: update to ${{ steps.check.outputs.latest }}"
