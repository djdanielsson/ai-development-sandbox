---
name: "Update DNF Package Versions"

on:
  schedule:
    - cron: "0 6 * * 1" # Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dnf-versions:
    runs-on: ubuntu-latest
    container:
      image: docker.io/library/fedora:43

    steps:
      - name: Install git
        run: dnf install -y git

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve latest DNF package versions
        id: resolve
        run: |
          PACKAGES=(
            curl
            dnf5
            dnf5-plugins
            eza
            findutils
            fzf
            gettext-envsubst
            gh
            git
            gnutls
            jq
            libdnf5
            libdnf5-cli
            libssh
            libtasn1
            nodejs
            podman
            procps-ng
            python3
            python3-pip
            sudo
            systemd-standalone-sysusers
            tar
            tox
            unzip
            uv
            vim-enhanced
            zoxide
            zsh
          )

          BS=$'\x5c'
          new_block="ARG DNF_PACKAGES=\"${BS}"
          changes=""

          for pkg in "${PACKAGES[@]}"; do
            resolved=$(dnf repoquery --latest-limit=1 --qf '%{name}-%{epoch}:%{version}-%{release}' "$pkg" 2>/dev/null | head -1)
            resolved="${resolved//-0:/-}"

            if [ -z "$resolved" ]; then
              echo "::warning::Could not resolve package: $pkg"
              new_block="${new_block}"$'\n'"    ${pkg} ${BS}"
            else
              new_block="${new_block}"$'\n'"    ${resolved} ${BS}"
            fi
          done

          new_block="${new_block}"$'\n''"'

          current_block=$(sed -n '/^ARG DNF_PACKAGES="/,/^"/p' .devcontainer/Containerfile)

          if [ "$current_block" = "$new_block" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No DNF package updates found."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"

            # Build a human-readable diff summary for the PR body
            diff_summary=""
            for pkg in "${PACKAGES[@]}"; do
              old_ver=$(echo "$current_block" | grep -oP "${pkg}-\K[^ \\\\]+" || true)
              new_ver=$(echo "$new_block" | grep -oP "${pkg}-\K[^ \\\\]+" || true)
              if [ "$old_ver" != "$new_ver" ] && [ -n "$new_ver" ]; then
                diff_summary="${diff_summary}- **${pkg}**: \`${old_ver}\` → \`${new_ver}\`"$'\n'
              fi
            done

            echo "diff_summary<<EOF" >> "$GITHUB_OUTPUT"
            echo "$diff_summary" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"

            # Replace the block in-place using awk for multiline replacement.
            # Pass via ENVIRON to avoid awk -v mangling backslashes.
            export new_block
            awk '
              /^ARG DNF_PACKAGES="/ { found=1; print ENVIRON["new_block"]; next }
              found && /^"/ { found=0; next }
              found { next }
              { print }
            ' .devcontainer/Containerfile > .devcontainer/Containerfile.tmp
            mv .devcontainer/Containerfile.tmp .devcontainer/Containerfile
          fi

      - name: Create pull request
        if: steps.resolve.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/update-dnf-versions
          delete-branch: true
          title: "dnf: update pinned package versions"
          body: |
            Automated update of DNF package version pins in the Containerfile.

            ### Changes
            ${{ steps.resolve.outputs.diff_summary }}

            ---
            *Generated by the [update-dnf-versions](${{ github.server_url }}/${{ github.repository }}/actions/workflows/update-dnf-versions.yml) workflow.*
          labels: dependencies,dnf
          commit-message: "dnf: update pinned package versions"
