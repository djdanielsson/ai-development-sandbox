---
name: "Update VS Code Extension Versions"

on:
  schedule:
    - cron: "30 6 * * 1" # Monday 06:30 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-extensions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for extension updates
        id: check
        run: |
          devcontainer_json=".devcontainer/devcontainer.json"
          changes=""
          updated="false"

          # Extract extensions: "publisher.name@version"
          extensions=$(grep -oP '"[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+@[^"]+' "$devcontainer_json" | tr -d '"')

          for ext in $extensions; do
            publisher="${ext%%.*}"
            name_version="${ext#*.}"
            name="${name_version%%@*}"
            current_version="${name_version#*@}"

            # Query the VS Code Marketplace API for latest version
            latest_version=$(curl -sf \
              -H "Content-Type: application/json" \
              -H "Accept: application/json;api-version=6.0-preview.1" \
              -d "{\"filters\":[{\"criteria\":[{\"filterType\":7,\"value\":\"${publisher}.${name}\"}]}],\"flags\":870}" \
              "https://marketplace.visualstudio.com/_apis/public/gallery/extensionquery" \
              | jq -r '.results[0].extensions[0].versions[0].version' 2>/dev/null || true)

            if [ -z "$latest_version" ] || [ "$latest_version" = "null" ]; then
              echo "::warning::Could not query version for ${publisher}.${name}"
              continue
            fi

            if [ "$current_version" != "$latest_version" ]; then
              echo "${publisher}.${name}: ${current_version} → ${latest_version}"
              sed -i "s|${publisher}.${name}@${current_version}|${publisher}.${name}@${latest_version}|" "$devcontainer_json"
              changes="${changes}- **${publisher}.${name}**: \`${current_version}\` → \`${latest_version}\`"$'\n'
              updated="true"
            fi
          done

          echo "changed=$updated" >> "$GITHUB_OUTPUT"
          echo "diff_summary<<EOF" >> "$GITHUB_OUTPUT"
          echo "$changes" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/update-extensions
          delete-branch: true
          title: "extensions: update VS Code extension versions"
          body: |
            Automated update of pinned VS Code extension versions in `devcontainer.json`.

            ### Changes
            ${{ steps.check.outputs.diff_summary }}

            ---
            *Generated by the [update-extensions](${{ github.server_url }}/${{ github.repository }}/actions/workflows/update-extensions.yml) workflow.*
          labels: dependencies,vscode-extensions
          commit-message: "extensions: update VS Code extension versions"
