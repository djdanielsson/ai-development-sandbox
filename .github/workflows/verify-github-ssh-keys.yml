---
name: "Verify GitHub SSH Host Keys"
on:
  schedule:
    - cron: "0 6 1 * *" # 1st of each month, 06:00 UTC
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  verify-ssh-keys:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Fetch current GitHub SSH keys and compare
        id: check
        run: |
          script=".devcontainer/scripts/container-init.sh"
          # Fetch GitHub's published SSH host keys via their API
          api_keys=$(curl -sf https://api.github.com/meta | jq -r '.ssh_keys[]')
          if [ -z "$api_keys" ]; then
            echo "::error::Failed to fetch SSH keys from GitHub API"
            exit 1
          fi
          # Build a known_hosts block from the API response
          new_known_hosts=""
          while IFS= read -r key; do
            new_known_hosts="${new_known_hosts}github.com ${key}"$'\n'
          done <<< "$api_keys"
          new_known_hosts=$(echo -n "$new_known_hosts" | sort)

          # Extract the current known_hosts block from container-init.sh
          current_known_hosts=$(sed -n "/^github.com /p" "$script" | sort)
          if [ "$current_known_hosts" = "$new_known_hosts" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "GitHub SSH host keys are up to date."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "GitHub SSH host keys have changed — updating container-init.sh"
            # Replace the known_hosts heredoc content
            # The block is between the KNOWN_HOSTS heredoc markers
            awk -v keys="$new_known_hosts" '
              /^github.com ssh-/ && inside { next }
              /cat > \/root\/\.ssh\/known_hosts <<'\''KNOWN_HOSTS'\''/ {
                print
                print keys
                inside=1
                next
              }
              /^KNOWN_HOSTS$/ { inside=0 }
              { print }
            ' "$script" > "${script}.tmp"
            mv "${script}.tmp" "$script"
            chmod +x "$script"
          fi

      - name: Create pull request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/update-github-ssh-keys
          delete-branch: true
          title: "security: update GitHub SSH host keys"
          body: |
            GitHub has rotated their SSH host keys. This PR updates the embedded
            `known_hosts` in `container-init.sh` to match the keys published at
            https://api.github.com/meta.
            **Action required:** Verify the new keys against
            [GitHub's documentation](https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/githubs-ssh-key-fingerprints)
            before merging.
            ---
            *Generated by the [verify-github-ssh-keys](${{ github.server_url }}/${{ github.repository }}/actions/workflows/verify-github-ssh-keys.yml) workflow.*
          labels: security,ssh
          commit-message: "security: update GitHub SSH host keys"
