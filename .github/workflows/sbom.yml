---
name: "SBOM & Vulnerability Scan"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  sbom:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build container image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .devcontainer
          file: .devcontainer/Containerfile
          push: false
          load: true
          tags: ai-sandbox:sbom-scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ai-sandbox:sbom-scan
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: sbom.cdx.json

      - name: Scan SBOM for vulnerabilities with Grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7
        id: grype
        with:
          sbom: sbom.cdx.json
          fail-build: false
          output-format: sarif

      - name: Upload Grype SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4.36.2
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: container-vulnerability-scan
