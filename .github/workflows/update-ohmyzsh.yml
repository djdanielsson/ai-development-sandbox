---
name: "Update Oh My Zsh Commit"

on:
  schedule:
    - cron: "10 6 * * 1" # Monday 06:10 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-ohmyzsh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for new Oh My Zsh commit
        id: check
        run: |
          latest_sha=$(git ls-remote https://github.com/ohmyzsh/ohmyzsh.git HEAD | awk '{print $1}')
          current_sha=$(grep -oP 'OHMYZSH_COMMIT="\K[^"]+' .devcontainer/Containerfile)

          echo "latest=$latest_sha" >> "$GITHUB_OUTPUT"
          echo "current=$current_sha" >> "$GITHUB_OUTPUT"

          if [ "$latest_sha" = "$current_sha" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Oh My Zsh is already up to date ($current_sha)."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Oh My Zsh update: $current_sha → $latest_sha"
            sed -i "s|OHMYZSH_COMMIT=\"${current_sha}\"|OHMYZSH_COMMIT=\"${latest_sha}\"|" .devcontainer/Containerfile
          fi

      - name: Create pull request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/update-ohmyzsh
          delete-branch: true
          title: "ohmyzsh: update pinned commit"
          body: |
            Automated update of the Oh My Zsh pinned commit SHA.

            ### Changes
            - **Oh My Zsh**: `${{ steps.check.outputs.current }}` → `${{ steps.check.outputs.latest }}`
            - [Compare commits](https://github.com/ohmyzsh/ohmyzsh/compare/${{ steps.check.outputs.current }}...${{ steps.check.outputs.latest }})

            ---
            *Generated by the [update-ohmyzsh](${{ github.server_url }}/${{ github.repository }}/actions/workflows/update-ohmyzsh.yml) workflow.*
          labels: dependencies,ohmyzsh
          commit-message: "ohmyzsh: update pinned commit to ${{ steps.check.outputs.latest }}"
