---
version: 2
updates:
  # Track base image updates in .devcontainer/Containerfile (fedora:43@sha256:...)
  - package-ecosystem: "docker"
    directory: "/.devcontainer"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "docker"
    labels:
      - "dependencies"
      - "docker"
    cooldown:
      default-days: 7

  # Track devcontainer feature updates (if features are added later)
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "devcontainer"
    labels:
      - "dependencies"
      - "devcontainer"
    cooldown:
      default-days: 7

  # Track GitHub Actions version updates in workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
    cooldown:
      default-days: 7

  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "pre-commit"
    labels:
      - "pre-commit"
    cooldown:
      default-days: 7
